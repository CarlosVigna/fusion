name: ETL - Dispositivos e Vínculo

on:
  schedule:
    - cron: '0 2 * * *'  # diariamente às 02:00 UTC
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: fusion-etl
        run: npm ci --omit=dev

      - name: Install Playwright Chromium
        working-directory: fusion-etl
        run: npx playwright install chromium --with-deps

      - name: Run ETL - Dispositivos
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: cd fusion-etl && node index.js
        env:
          MULTIPORTAL_URL: ${{ secrets.MULTIPORTAL_URL }}
          MULTIPORTAL_USER: ${{ secrets.MULTIPORTAL_USER }}
          MULTIPORTAL_PASSWORD: ${{ secrets.MULTIPORTAL_PASSWORD }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ETL_API_KEY: ${{ secrets.ETL_API_KEY }}
          ETL_HEADLESS: 'true'
          ETL_DOWNLOADS_DIR: /tmp/etl/downloads
          ETL_OUTPUT_DIR: /tmp/etl/pending
          ETL_TEMP_DIR: /tmp/etl/temp
          ETL_LOG_DIR: /tmp/etl/logs

      - name: Run ETL - Vínculo
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: cd fusion-etl && node index-vinculo.js
        env:
          MULTIPORTAL_URL: ${{ secrets.MULTIPORTAL_URL }}
          MULTIPORTAL_USER: ${{ secrets.MULTIPORTAL_USER }}
          MULTIPORTAL_PASSWORD: ${{ secrets.MULTIPORTAL_PASSWORD }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ETL_API_KEY: ${{ secrets.ETL_API_KEY }}
          ETL_HEADLESS: 'true'
          ETL_DOWNLOADS_DIR: /tmp/etl/downloads
          ETL_OUTPUT_DIR: /tmp/etl/pending
          ETL_TEMP_DIR: /tmp/etl/temp
          ETL_LOG_DIR: /tmp/etl/logs
