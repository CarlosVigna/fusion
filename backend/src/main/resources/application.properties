spring.application.name=fusion

server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.order_inserts=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

fusion.imports.root=${IMPORTS_ROOT:/tmp/fusion/imports}
fusion.imports.retention=10

fusion.etl.api-key=${ETL_API_KEY:}
fusion.etl.server-url=${ETL_SERVER_URL:http://localhost:3001}

portal.parceiro.url=https://onmeseguros.com.br
portal.parceiro.client-id=${PORTAL_PARCEIRO_CLIENT_ID:}
portal.parceiro.client-secret=${PORTAL_PARCEIRO_CLIENT_SECRET:}

fusion.operational.delayed-minutes=30
fusion.operational.no-communication-minutes=360
fusion.operational.stale-update-hours=6
fusion.operational.low-battery-level=20

spring.task.scheduling.pool.size=3

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

